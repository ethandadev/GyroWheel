name: Build Windows Receiver

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      env:
        VGAMEPAD_SKIP_VIGEMBUS_INSTALL: "true" # Blocks the interactive popup installer
      run: |
        # ⚡ BYPASS HANG: Create a mock reg.bat to skip vgamepad's slow recursive registry scan
        New-Item -ItemType Directory -Force -Path "C:\mock_bin"
        "@echo off`necho." | Out-File -FilePath "C:\mock_bin\reg.bat" -Encoding ascii
        $env:PATH = "C:\mock_bin;" + $env:PATH

        python -m pip install --upgrade pip
        pip install pyinstaller --prefer-binary
        pip install -r windows/requirements.txt --prefer-binary

    - name: Build with PyInstaller
      run: |
        cd windows
        pyinstaller --onefile --noconsole --name "GyroWheel_Receiver" receiver.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GyroWheel-Receiver-Windows
        path: windows/dist/GyroWheel_Receiver.exe
