name: Build Windows Receiver

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      env:
        VGAMEPAD_SKIP_VIGEMBUS_INSTALL: "true" # 🛑 Blocks the interactive installer from stalling the headless runner
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller --prefer-binary
        pip install -r windows/requirements.txt --prefer-binary

    # 🛠️ THIS STEP CREATES THE EXE FILE:
    - name: Build with PyInstaller
      run: |
        cd windows
        pyinstaller --onefile --noconsole --name "GyroWheel_Receiver" receiver.py

    # 📦 THIS STEP UPLOADS IT TO GITHUB ACTIONS SO YOU CAN DOWNLOAD IT:
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GyroWheel-Receiver-Windows
        path: windows/dist/GyroWheel_Receiver.exe
