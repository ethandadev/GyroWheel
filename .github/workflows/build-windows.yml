name: Build Windows Receiver

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  workflow_call:

# vgamepad's setup.py runs an INTERACTIVE msiexec for ViGEmBus unless this is
# set — which hangs a headless runner forever. Job-wide so pip's isolated build
# subprocess sees it too.
env:
  VGAMEPAD_SKIP_VIGEMBUS_INSTALL: "true"

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    # Belt-and-suspenders: make vgamepad's registry scan find ViGEmBus as
    # "already installed", so it skips the installer branch entirely. We only
    # need vgamepad importable to bundle it — the real driver is installed by
    # the end user at runtime.
    - name: Pre-seed ViGEmBus registry marker
      shell: pwsh
      run: |
        $key = "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\ViGEmBus"
        New-Item -Path $key -Force | Out-Null
        Set-ItemProperty -Path $key -Name "DisplayName" -Value "Nefarius Virtual Gamepad Emulation Bus Driver"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller --prefer-binary
        pip install -r windows/requirements.txt --prefer-binary

    - name: Build with PyInstaller
      run: |
        cd windows
        pyinstaller --onefile --noconsole --name "GyroWheel_Receiver" receiver.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GyroWheel-Receiver-Windows
        path: windows/dist/GyroWheel_Receiver.exe
