name: Build macOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    runs-on: macos-15

    steps:
    - uses: actions/checkout@v4

    # XcodeGen emits an Xcode 16 project format (77); pick the newest Xcode.
    - name: Use latest Xcode
      run: |
        sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
        xcodebuild -version

    - name: Install XcodeGen
      run: brew install xcodegen

    # Import the Developer ID Application cert into a throwaway keychain.
    - name: Import signing certificate
      env:
        MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
        MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      run: |
        set -euo pipefail
        CERT="$RUNNER_TEMP/cert.p12"
        KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
        KP="$(openssl rand -base64 24)"
        echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERT"
        security create-keychain -p "$KP" "$KEYCHAIN"
        security set-keychain-settings -lut 21600 "$KEYCHAIN"
        security unlock-keychain -p "$KP" "$KEYCHAIN"
        security import "$CERT" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KP" "$KEYCHAIN" >/dev/null
        security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
        echo "Identities:"; security find-identity -v -p codesigning "$KEYCHAIN"

    - name: Generate Xcode project
      run: cd mac/Receiver && xcodegen generate

    - name: Build & sign (Developer ID, hardened runtime)
      env:
        MACOS_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
      run: |
        cd mac/Receiver
        # The app's normal entitlements include the restricted "HID Virtual Device"
        # capability, which would require a provisioning profile that carries that
        # (Apple-gated) feature. For the notarized download we sign WITHOUT it —
        # the virtual gamepad still works on a Mac running SIP/AMFI disabled, which
        # is required for it regardless. (Local build.sh keeps the entitlement.)
        printf '<?xml version="1.0" encoding="UTF-8"?>\n<plist version="1.0"><dict/></plist>\n' > "$RUNNER_TEMP/ci.entitlements"
        xcodebuild -project GyroWheelReceiver.xcodeproj -scheme GyroWheelReceiver \
          -configuration Release -derivedDataPath build \
          CODE_SIGN_STYLE=Manual \
          CODE_SIGN_IDENTITY="Developer ID Application" \
          DEVELOPMENT_TEAM="$MACOS_TEAM_ID" \
          CODE_SIGN_ENTITLEMENTS="$RUNNER_TEMP/ci.entitlements" \
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
          ENABLE_HARDENED_RUNTIME=YES \
          OTHER_CODE_SIGN_FLAGS="--timestamp" \
          build

    - name: Notarize & staple
      env:
        MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
        MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
        MACOS_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
      run: |
        set -uo pipefail
        cd mac/Receiver
        APP="build/Build/Products/Release/GyroWheelReceiver.app"

        echo "::group::Signature check (codesign)"
        codesign -dvvv --entitlements - "$APP" || true
        echo "::endgroup::"

        ditto -c -k --keepParent "$APP" notarize.zip
        RESULT=$(xcrun notarytool submit notarize.zip \
          --apple-id "$MACOS_NOTARY_APPLE_ID" \
          --password "$MACOS_NOTARY_PASSWORD" \
          --team-id "$MACOS_TEAM_ID" \
          --wait --output-format json)
        echo "$RESULT"
        ID=$(echo "$RESULT" | python3 -c "import sys,json;print(json.load(sys.stdin)['id'])")
        STATUS=$(echo "$RESULT" | python3 -c "import sys,json;print(json.load(sys.stdin)['status'])")

        if [ "$STATUS" != "Accepted" ]; then
          echo "::group::Notary log (why it was $STATUS)"
          xcrun notarytool log "$ID" \
            --apple-id "$MACOS_NOTARY_APPLE_ID" \
            --password "$MACOS_NOTARY_PASSWORD" \
            --team-id "$MACOS_TEAM_ID" || true
          echo "::endgroup::"
          exit 1
        fi

        xcrun stapler staple "$APP"
        ditto -c -k --keepParent "$APP" GyroWheelReceiver-macOS.app.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GyroWheel-Receiver-macOS
        path: mac/Receiver/GyroWheelReceiver-macOS.app.zip
