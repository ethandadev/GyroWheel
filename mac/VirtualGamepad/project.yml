name: GamepadReceiver
options:
  bundleIdPrefix: com.gyrowheel
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  # ---- Host app (SwiftUI): UDP receiver + system-extension activation + IOKit feed
  GamepadReceiver:
    type: application
    platform: macOS
    sources:
      - path: Host
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gyrowheel.VirtualGamepad
        INFOPLIST_FILE: Host/Info.plist
        CODE_SIGN_ENTITLEMENTS: Host/GamepadReceiver.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: Host/Host-Bridging-Header.h
        HEADER_SEARCH_PATHS: $(SRCROOT)/Shared
        SWIFT_VERSION: "5.0"
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - target: VirtualGamepadDriver
        embed: true
        codeSign: true

  # ---- DriverKit extension (C++): the virtual HID gamepad
  VirtualGamepadDriver:
    type: driver-extension
    platform: macOS
    sources:
      - path: Driver
      - path: Shared
    settings:
      base:
        SDKROOT: driverkit
        SUPPORTED_PLATFORMS: driverkit
        PRODUCT_BUNDLE_IDENTIFIER: com.gyrowheel.VirtualGamepad.Driver
        PRODUCT_NAME: VirtualGamepadDriver
        INFOPLIST_FILE: Driver/Info.plist
        CODE_SIGN_ENTITLEMENTS: Driver/VirtualGamepadDriver.entitlements
        HEADER_SEARCH_PATHS: $(SRCROOT)/Shared
        DRIVERKIT_DEPLOYMENT_TARGET: "20.0"
        CLANG_CXX_LANGUAGE_STANDARD: gnu++17
        OTHER_LDFLAGS: -framework DriverKit -framework HIDDriverKit
